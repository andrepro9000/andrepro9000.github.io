<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Meu Site Profissional</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f172a;
      color: white;
      text-align: center;
    }
    .container {
      padding: 100px 20px;
    }
    h1 {
      font-size: 48px;
      color: #38bdf8;
    }
    p {
      font-size: 20px;
      color: #cbd5f5;
    }
    .btn {
      margin-top: 20px;
      display: inline-block;
      padding: 15px 30px;
      background: #38bdf8;
      color: black;
      text-decoration: none;
      border-radius: 8px;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Seu site profissional 🚀</h1>
    <p>Eu crio páginas modernas para empresas</p>
    <a class="btn" href="#">Fale comigo</a>
  </div>
</body>
</html>
